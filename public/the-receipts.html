/* SHARE / SAVE POSTER */
const shareImage=(id,headline)=>{
const el=document.getElementById(id);
if(!el||!window.html2canvas){alert("One moment - try again.");return;}
html2canvas(el,{scale:3,backgroundColor:null,useCORS:true,logging:false}).then(canvas=>{
  const size=Math.max(canvas.width,canvas.height);
  const sq=document.createElement('canvas');sq.width=size;sq.height=size;
  const ctx=sq.getContext('2d');
  ctx.fillStyle=el.style.background||"#0A0A0E";ctx.fillRect(0,0,size,size);
  ctx.drawImage(canvas,(size-canvas.width)/2,(size-canvas.height)/2);
  const fname="receipts-"+((headline||"poster").replace(/[^a-z0-9]/gi,"-").toLowerCase().slice(0,36))+".png";
  sq.toBlob(function(blob){
    const file=new File([blob],fname,{type:"image/png"});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:"The Receipts: "+headline,text:"Career intelligence by Jackye Clayton x WDIWF — wdiwf.jackyeclayton.com"}).catch(function(){});
    } else {
      const a=document.createElement("a");
      a.download=fname;
      a.href=URL.createObjectURL(blob);
      a.click();
      setTimeout(function(){URL.revokeObjectURL(a.href);},10000);
    }
  },"image/png");
});};

/* DEBATE (live votes via Supabase) */
const Debate=({item})=>{
const t=useContext(ThemeCtx);
const{votes,myVotes,castVote}=useContext(VoteCtx);
if(!item.debate||!item.sides)return null;
const sv=votes[item.id]||{0:0,1:0};
const total=(sv[0]||0)+(sv[1]||0);
const myVote=myVotes[item.id];
const hasVoted=myVote!==undefined;
const pct=(side)=>total===0?50:Math.round(((sv[side]||0)/total)*100);
const handle=(side)=>{if(hasVoted)return;castVote(item.id,side);};
const msg=()=>{
  if(total===0)return null;
  if(total===1)return"You're the first to vote. 👑";
  const p=pct(myVote);
  if(p>=70)return p+"% agree — the receipts don't lie. 🌶️";
  if(p<=30)return"Only "+p+"% agree. Bold. Stay there. 💅";
  return total+" votes in. Split right down the middle. Nobody's neutral here. 🔥";
};
return(
<div style={{marginTop:20,background:t.card,border:`1px solid ${t.brd}`,borderRadius:12,padding:22}}>
<p style={{fontSize:12,fontWeight:900,textTransform:"uppercase",letterSpacing:"0.18em",color:t.gold,marginBottom:12,fontFamily:"'DM Mono',monospace"}}>{"💬"} The Debate</p>
<p style={{fontSize:18,fontWeight:700,color:t.cream,marginBottom:18,lineHeight:1.4}}>{item.debate}</p>
{item.sides.map((s,i)=>{
  const p=pct(i);
  const isMine=myVote===i;
  const isOther=hasVoted&&!isMine;
  return(
  <div key={i} style={{marginBottom:12,position:"relative"}}>
    <button onClick={()=>handle(i)} disabled={hasVoted} style={{display:"block",width:"100%",textAlign:"left",padding:"14px 18px",borderRadius:10,fontSize:16,cursor:hasVoted?"default":"pointer",background:isMine?`${t.gold}18`:t.card,border:isMine?`2px solid ${t.gold}`:`1px solid ${t.brd}`,color:isMine?t.cream:isOther?t.muted:t.cream,lineHeight:1.5,transition:"all 0.2s",overflow:"hidden",position:"relative",opacity:isOther?0.6:1}}>
      {hasVoted&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:p+"%",background:isMine?`${t.gold}15`:"rgba(255,255,255,0.04)",transition:"width 0.7s ease",borderRadius:"10px 0 0 10px",pointerEvents:"none"}}/>}
      <span style={{position:"relative",zIndex:1,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
        <span>{s}{isMine&&<span style={{marginLeft:10,fontSize:12,color:t.gold,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{"←"} your take</span>}</span>
        {hasVoted&&<span style={{fontSize:15,fontWeight:900,fontFamily:"'DM Mono',monospace",color:isMine?t.gold:t.muted,flexShrink:0}}>{p}%</span>}
      </span>
    </button>
  </div>);})}
{!hasVoted&&total>0&&<p style={{fontSize:12,color:t.muted,fontStyle:"italic",marginTop:4,fontFamily:"'DM Mono',monospace"}}>{total} {total===1?"person has":"people have"} weighed in. Vote to see the tally.</p>}
{hasVoted&&msg()&&<p style={{fontSize:13,color:t.muted,textAlign:"center",fontStyle:"italic",marginTop:8,fontFamily:"'DM Mono',monospace"}}>{msg()}</p>}
</div>);};

<button onClick={()=>setOpen(!open)} style={{background:"none",border:"none",cursor:"pointer",padding:"12px 0",display:"flex",alignItems:"center",gap:8,color:t.muted,fontSize:12,fontWeight:600,letterSpacing:"0.08em",fontFamily:"'DM Mono',monospace"}}>
<span style={{color:t.gold}}>?</span> HOW TO READ THIS {open?"▲":"▼"}
</button>
{open&&<div style={{paddingBottom:20,display:"flex",flexWrap:"wrap",gap:28}}>
  <div>
    <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"'DM Mono',monospace"}}>Spice Level</div>
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {[[1,"Footnote. You should know this exists."],[2,"Side-eye. Something's off here."],[3,"Screenshot this. Send it to your group chat."],[4,"We have a problem. This affects your job."],[5,"They thought we wouldn't find out. We found out."]].map(([n,label])=>(
        <div key={n} style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{minWidth:80}}>{[1,2,3,4,5].map(i=><span key={i} style={{fontSize:12,opacity:i<=n?1:0.18}}>{"🌶️"}</span>)}</span>
          <span style={{fontSize:15,color:t.muted}}>{label}</span>
        </div>
      ))}
    </div>
  </div>
  <div>
    <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"'DM Mono',monospace"}}>Source Bias</div>
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      {[["#3B82F6","Left"],["#60A5FA","Lean Left"],["#A78BFA","Center"],["#FB7185","Lean Right"],["#EF4444","Right"]].map(([c,l])=>(
        <div key={l} style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:14,height:14,borderRadius:"50%",background:c}}/>
          <span style={{fontSize:12,color:t.muted}}>{l}</span>
        </div>
      ))}
    </div>
  </div>
  <div>
    <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"'DM Mono',monospace"}}>Badges</div>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{background:t.gold,color:t.bg,fontSize:10,fontWeight:900,padding:"2px 8px",borderRadius:3}}>HOT</span><span style={{fontSize:12,color:t.muted}}>Breaking or trending this week</span></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,color:t.gold,fontWeight:700}}>{"🔒"} Read the article {"↗"}</span><span style={{fontSize:12,color:t.muted}}>Source requires subscription</span></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,color:t.gold,fontWeight:700}}>Read the article {"↗"}</span><span style={{fontSize:12,color:t.muted}}>Free to read</span></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,color:t.gold,fontWeight:700}}>Jackye's take {"→"}</span><span style={{fontSize:12,color:t.muted}}>Her unfiltered analysis — always free</span></div>
    </div>
  </div>
  <div>
    <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8,fontFamily:"'DM Mono',monospace"}}>Categories</div>
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      {Object.entries(catColors).filter(([k])=>k!=="ALL").map(([k,c])=>(
        <div key={k} style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:10,height:10,borderRadius:2,background:c}}/>
          <span style={{fontSize:12,color:t.muted,textTransform:"capitalize"}}>{k==="AI"?"AI & Automation":k==="DEI"?"DEI & Culture":k==="WORK"?"Work & Labor":k==="POLICY"?"Policy & Law":k==="MONEY"?"Money & Power":"Labor Markets"}</span>
        </div>
      ))}
    </div>
  </div>
</div>}
</div>
</div>);};

/* MAIN APP */
function App(){
const[themeKey,setThemeKey]=useState(()=>autoTheme());
const[isAuto,setIsAuto]=useState(true);
const[cat,setCat]=useState("ALL");
const[sortDrama,setSortDrama]=useState(false);
const[lbItem,setLbItem]=useState(null);
const[votes,setVotes]=useState({});
const[myVotes,setMyVotes]=useState({});
const[liveItems,setLiveItems]=useState([]);
const[loadingLive,setLoadingLive]=useState(true);
const t=THEMES[themeKey];
const isDay=themeKey==='day';

/* Load live Jackye-fied stories from Supabase on mount */
useEffect(()=>{
  loadLiveReceipts().then(live=>{
    if(live.length>0)setLiveItems(live);
    setLoadingLive(false);
  });
  /* Refresh every 10 minutes */
  const refreshId=setInterval(()=>{
    loadLiveReceipts().then(live=>{if(live.length>0)setLiveItems(live);});
  },600000);
  return()=>clearInterval(refreshId);
},[]);

/* Merge live + static items — live stories appear first */
const allItems=useMemo(()=>{
  const liveIds=new Set(liveItems.map(i=>i.hl));
  const deduped=items.filter(i=>!liveIds.has(i.hl));
  return[...liveItems,...deduped];
},[liveItems]);

useEffect(()=>{
  if(!isAuto)return;
  const id=setInterval(()=>{const next=autoTheme();if(next!==themeKey)setThemeKey(next);},60000);
  return()=>clearInterval(id);
},[isAuto,themeKey]);

useEffect(()=>{document.body.style.background=t.bg;document.body.style.color=t.cream;},[t]);

const toggleTheme=()=>{setIsAuto(false);setThemeKey(k=>k==='night'?'day':'night');};

const filtered=useMemo(()=>{
  let list=cat==="ALL"?[...allItems]:allItems.filter(i=>i.cat===cat);
  if(sortDrama)list=[...list].sort((a,b)=>(b.spice||0)-(a.spice||0));
  return list;
},[cat,sortDrama,allItems]);
const feat=filtered.find(i=>i.hot)||filtered[0];
const grid=filtered.filter(i=>i.id!==feat&&feat&&i.id!==feat.id);
const cats=["ALL","AI","WORK","POLICY","LABOR","DEI","MONEY"];
const hot5=allItems.filter(i=>i.spice>=4).slice(0,5);

useEffect(()=>{
  const h=e=>{if(e.key==='Escape')setLbItem(null);};
  window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
},[]);

useEffect(()=>{
  if(!sb)return;
  sb.from('debate_votes').select('story_id,side').then(({data})=>{
    if(!data)return;
    const c={};
    data.forEach(({story_id,side})=>{
      if(!c[story_id])c[story_id]={0:0,1:0};
      c[story_id][side]=(c[story_id][side]||0)+1;
    });
    setVotes(c);
  });
},[]);

const castVote=async(storyId,side)=>{
  if(myVotes[storyId]!==undefined)return;
  setMyVotes(mv=>({...mv,[storyId]:side}));
  setVotes(v=>{const cur=v[storyId]||{0:0,1:0};return{...v,[storyId]:{...cur,[side]:(cur[side]||0)+1}};});
  if(sb){const vid=getVoterId();await sb.from('debate_votes').upsert({story_id:storyId,side,voter_id:vid},{onConflict:'story_id,voter_id'});}
};

return(
<ThemeCtx.Provider value={t}>
<LightboxCtx.Provider value={setLbItem}>
<VoteCtx.Provider value={{votes,myVotes,castVote}}>
<div style={{minHeight:"100vh",background:t.bg,color:t.cream,transition:"background 0.3s,color 0.3s"}}>

{lbItem&&<Lightbox item={lbItem} onClose={()=>setLbItem(null)} t={t}/>}

<div style={{background:t.tickerBg,borderBottom:`1px solid ${t.brd}`,overflow:"hidden",position:"relative",height:40}}>
<div style={{position:"absolute",left:0,top:0,bottom:0,width:56,background:`linear-gradient(to right,${t.bg},transparent)`,zIndex:10}}/>
<div style={{position:"absolute",right:0,top:0,bottom:0,width:56,background:`linear-gradient(to left,${t.bg},transparent)`,zIndex:10}}/>
<div style={{display:"flex",whiteSpace:"nowrap",animation:"marquee 100s linear infinite",alignItems:"center",height:"100%"}}>
{[...allItems,...allItems].map((it,i)=>(
<span key={i} style={{display:"inline-flex",alignItems:"center",gap:8,margin:"0 28px",flexShrink:0}}>
{it.hot&&<span style={{background:t.gold,color:t.bg,fontSize:8,fontWeight:900,padding:"2px 6px",borderRadius:3,textTransform:"uppercase",animation:"pulse 2s infinite"}}>HOT</span>}
<span style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.12em",color:catColors[it.cat],fontFamily:"'DM Mono',monospace"}}>{it.cat}</span>
<span style={{width:6,height:6,borderRadius:"50%",background:biasC[it.bias]&&biasC[it.bias].c,flexShrink:0}}/>
<span style={{fontSize:12,fontWeight:600,color:t.cream}}>{it.hl}</span>
<span style={{fontSize:10,color:t.muted,fontFamily:"'DM Mono',monospace"}}>{it.src}</span>
<span style={{color:t.brd,margin:"0 4px"}}>{"·"}</span>
</span>))}
</div>
</div>

<header style={{background:t.bg,borderBottom:`1px solid ${t.brd}`,padding:"44px 32px 36px",textAlign:"center"}}>
<div style={{maxWidth:780,margin:"0 auto"}}>
<p style={{fontSize:14,textTransform:"uppercase",letterSpacing:"0.55em",color:t.gold,marginBottom:14,fontFamily:"'DM Mono',monospace"}}>Jackye Clayton {"👑"} {"×"} WDIWF presents</p>
<h1 style={{fontSize:"clamp(48px,6vw,80px)",fontWeight:900,color:t.cream,lineHeight:1,letterSpacing:"-0.025em",fontFamily:"'Inter','DM Sans',sans-serif"}}>The Receipts</h1>
<p style={{fontSize:"clamp(18px,2.2vw,26px)",fontWeight:300,color:t.muted,fontStyle:"italic",marginTop:12}}>The world of work. Documented.</p>
<p style={{fontSize:"clamp(15px,1.6vw,19px)",fontWeight:500,color:t.cream,marginTop:10,opacity:0.8}}>I pull the receipts so you don't have to. <span style={{color:t.gold}}>They always leave something out.</span></p>
<div style={{width:52,height:2,background:t.gold,margin:"22px auto"}}/>
<p style={{fontSize:14,color:t.muted,letterSpacing:"0.12em",fontFamily:"'DM Mono',monospace"}}>
Jackye Clayton {"👑"} {"×"} <a href={NEWSLETTER} style={{color:t.gold,fontWeight:700}}>WDIWF</a>
<span style={{margin:"0 10px",color:t.brd}}>{"·"}</span>
<span style={{fontStyle:"italic"}}>"Stop applying. Start aligning."</span>
</p>
</div>
</header>

<nav style={{borderBottom:`1px solid ${t.brd}`,padding:"0 32px",position:"sticky",top:0,background:t.bg,zIndex:20}}>
<div style={{maxWidth:1160,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div style={{display:"flex",overflowX:"auto"}}>
{cats.map(c=>{const a=cat===c,cc=catColors[c];return(
<button key={c} onClick={()=>setCat(c)} style={{padding:"16px 16px",background:"none",border:"none",borderBottom:a?"2px solid "+(cc||t.gold):"2px solid transparent",cursor:"pointer",fontSize:13,fontWeight:a?800:500,textTransform:"uppercase",letterSpacing:"0.12em",color:a?(cc||t.gold):t.muted,transition:"all 0.15s",whiteSpace:"nowrap",flexShrink:0,fontFamily:"'DM Sans',sans-serif"}}>
{c}
</button>);})}
</div>
<div style={{display:"flex",gap:10,alignItems:"center",flexShrink:0,paddingLeft:16}}>
<button onClick={()=>setSortDrama(s=>!s)} style={{
  display:"flex",alignItems:"center",gap:6,
  background:sortDrama?t.gold:`${t.gold}15`,
  border:`1.5px solid ${t.gold}`,
  color:sortDrama?t.bg:t.gold,
  borderRadius:20,padding:"7px 14px",
  cursor:"pointer",fontSize:13,fontWeight:700,
  transition:"all 0.2s",fontFamily:"'DM Sans',sans-serif",
  whiteSpace:"nowrap",
}}>
{"🌶️"} {sortDrama?"Sorted by drama":"Sort by drama"}
</button>
<ThemeToggle isDay={isDay} onToggle={toggleTheme} isAuto={isAuto} t={t}/>
</div>
</div>
</nav>

<HowToRead/>

<div style={{maxWidth:1160,margin:"0 auto",padding:"48px 32px",display:"grid",gridTemplateColumns:"1fr 320px",gap:52,alignItems:"start"}}>
<main>
{feat&&<>
<p style={{fontSize:9,textTransform:"uppercase",letterSpacing:"0.5em",color:t.muted,marginBottom:22,fontFamily:"'DM Mono',monospace"}}>Featured Story</p>
<Featured item={feat}/>
{grid.length>0&&<div style={{display:"flex",alignItems:"center",gap:16,margin:"4px 0 36px"}}>
<div style={{flex:1,height:1,background:t.brd}}/>
<span style={{fontSize:9,textTransform:"uppercase",letterSpacing:"0.4em",color:t.muted,fontFamily:"'DM Mono',monospace"}}>Latest</span>
<div style={{flex:1,height:1,background:t.brd}}/>
</div>}
</>}
{grid.map(i=><Card key={i.id} item={i}/>)}
</main>
<Sidebar hot5={hot5}/>
</div>

<footer style={{borderTop:`1px solid ${t.brd}`,padding:"40px 32px",textAlign:"center"}}>
<p style={{fontSize:12,color:t.muted,letterSpacing:"0.1em",fontFamily:"'DM Mono',monospace"}}>The Receipts{"™"} {"·"} <em>by Jackye Clayton {"👑"} {"×"} WDIWF</em></p>
<p style={{fontSize:11,color:t.muted,marginTop:8}}>Jackye Clayton {"👑"} {"×"} <a href={NEWSLETTER} style={{color:t.gold}}>WDIWF</a></p>
<p style={{fontSize:10,color:t.muted,marginTop:6,fontStyle:"italic"}}>"Every company runs a background check on you. WDIWF runs one on them."</p>
<div style={{display:"flex",justifyContent:"center",gap:32,marginTop:16}}>
<a href={NEWSLETTER} style={{fontSize:10,color:t.muted,letterSpacing:"0.1em",fontFamily:"'DM Mono',monospace"}}>wdiwf.jackyeclayton.com</a>
<a href="https://jackyeclayton.com" style={{fontSize:10,color:t.muted,letterSpacing:"0.1em",fontFamily:"'DM Mono',monospace"}}>jackyeclayton.com</a>
</div>
</footer>

</div>
</VoteCtx.Provider>
</LightboxCtx.Provider>
</ThemeCtx.Provider>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
