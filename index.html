            "name": "How does the Employer Clarity Score work?",
            "acceptedAnswer": {
              "@type": "Answer",

            }
          },

            "@type": "Question",
            "name": "What data sources does Who Do I Work For use?",

              "@type": "Answer",

            }
          },
          {
            "@type": "Question",
            "name": "Who created Who Do I Work For?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Who Do I Work For was created by Jackye Clayton, who has 15+ years of experience in talent acquisition and HR technology. Jackye is a board member, LinkedIn Learning instructor, and HR technology advisor known for advocacy around employer accountability and workplace transparency."
            }
          },

            "@type": "Question",
            "name": "Is Who Do I Work For free to use?",

              "@type": "Answer",

            }
          }

    <script>
      // Hide static hero once React mounts
      var observer = new MutationObserver(function(mutations) {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var hero = document.getElementById('static-hero');
          if (hero) hero.style.display = 'none';
          observer.disconnect();
        }
